name: Auto Release on Push

on:
  push:
    branches: [ main ]          # 每次推送到 main 分支时触发

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25
      - name: Tidy
        run: go mod tidy
        working-directory: ./backend
      - name: Build
        run: go build -o community .
        working-directory: ./backend
      # 可选：上传测试产物（非必须）
      - uses: actions/upload-artifact@v4
        with:
          name: community-bin
          path: backend/community*

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.25
      - name: Tidy
        run: go mod tidy
        working-directory: ./backend
      - name: Build for Release
        run: go build -o community .
        working-directory: ./backend

      # 生成自动版本号
      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=v0.0.1-${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Auto Release ${{ steps.version.outputs.VERSION }}"
          files: backend/community*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}